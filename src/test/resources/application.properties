spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# Mail is required only because EmailNotificationService depends on JavaMailSender.
# For tests we just need Spring to create the JavaMailSender bean; no real SMTP is required.
spring.mail.host=localhost
spring.mail.port=1025
app.mail.from=no-reply@claims-mvp.local
